<svg
  width="200"
  height="200"
  viewBox="0 0 200 200"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>

  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B35" />
      <stop offset="100%" stop-color="#F7931E" />
    </linearGradient>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#004E89" />
      <stop offset="100%" stop-color="#1A659E" />
    </linearGradient>
    <linearGradient id="techGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C63FF" />
      <stop offset="100%" stop-color="#4ECDC4" />
    </linearGradient>
  </defs>

  <!-- Outer circle (tech/automation ring) -->
  <circle
    cx="100"
    cy="100"
    r="95"
    stroke="url(#techGradient)"
    stroke-width="3"
    fill="none"
    stroke-dasharray="8 4"
    opacity="0.6"
  />

  <!-- Basketball -->
  <circle
    cx="100"
    cy="100"
    r="70"
    fill="url(#orangeGradient)"
  />

  <!-- Basketball lines -->
  <path
    d="M 100 30 Q 120 100 100 170"
    stroke="#D97706"
    stroke-width="2.5"
    fill="none"
    opacity="0.8"
  />
  <path
    d="M 100 30 Q 80 100 100 170"
    stroke="#D97706"
    stroke-width="2.5"
    fill="none"
    opacity="0.8"
  />
  <ellipse
    cx="100"
    cy="100"
    rx="70"
    ry="25"
    stroke="#D97706"
    stroke-width="2.5"
    fill="none"
    opacity="0.8"
  />

  <!-- Automation/gear icons -->
  <g transform="translate(145, 45)" opacity="0.9">
    <circle cx="0" cy="0" r="12" fill="url(#techGradient)" />
    <path
      d="M -6 0 L -4 0 L -4 -8 L 4 -8 L 4 0 L 6 0 L 6 -10 L -6 -10 Z"
      fill="white"
      transform="translate(0, 4)"
    />
    <circle cx="0" cy="-2" r="3" fill="white" />
  </g>

  <!-- Lightning bolt (automation/speed) -->
  <g transform="translate(55, 45)" opacity="0.9">
    <circle cx="0" cy="0" r="12" fill="url(#techGradient)" />
    <path
      d="M 2 -6 L -4 2 L 0 2 L -2 6 L 4 -2 L 0 -2 Z"
      fill="white"
    />
  </g>

  <!-- Small tech dots -->
  <circle cx="145" cy="155" r="4" fill="url(#techGradient)" opacity="0.7" />
  <circle cx="55" cy="155" r="4" fill="url(#techGradient)" opacity="0.7" />
  <circle cx="160" cy="100" r="3" fill="url(#techGradient)" opacity="0.5" />
  <circle cx="40" cy="100" r="3" fill="url(#techGradient)" opacity="0.5" />
</svg>
